---
- name: Setup Synth Subnet Miner
  hosts: miners
  become: true
  vars:
    install_dir: /opt/synth-subnet
    swap_size_gb: 12
    wallet_name: "{{ miner_wallet_name | default('miner') }}"
    wallet_hotkey: "{{ miner_wallet_hotkey | default('default') }}"
    network: "{{ miner_network | default('finney') }}"
    netuid: "{{ miner_netuid | default(50) }}"
    axon_port: "{{ miner_axon_port | default(8091) }}"

  tasks:
    - name: Update and upgrade packages
      apt:
        update_cache: true
        upgrade: dist

    - name: Add deadsnakes PPA
      apt_repository:
        repo: ppa:deadsnakes/ppa
        state: present

    - name: Install system dependencies
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-distutils
          - nodejs
          - npm
          - pkg-config
          - curl
          - build-essential
          - make
          - git
          - ufw
        state: present
        update_cache: true

    - name: Install Rust
      shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      args:
        creates: /root/.cargo/bin/rustc
      environment:
        HOME: /root

    - name: Install PM2 globally
      npm:
        name: pm2
        global: true

    - name: Configure UFW - allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Configure UFW - allow axon port
      ufw:
        rule: allow
        port: "{{ axon_port }}"
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Create swap file
      command: fallocate -l {{ swap_size_gb }}G /swapfile
      args:
        creates: /swapfile

    - name: Set swap file permissions
      file:
        path: /swapfile
        mode: "0600"

    - name: Format swap file
      command: mkswap /swapfile
      when: ansible_swaptotal_mb < (swap_size_gb * 1024)

    - name: Enable swap
      command: swapon /swapfile
      when: ansible_swaptotal_mb < (swap_size_gb * 1024)
      ignore_errors: true

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Clone synth-subnet repository
      git:
        repo: https://github.com/mode-network/synth-subnet.git
        dest: "{{ install_dir }}"
        force: true

    - name: Create Python virtual environment
      command: python3.11 -m venv {{ install_dir }}/bt_venv
      args:
        creates: "{{ install_dir }}/bt_venv/bin/python3"

    - name: Install Python dependencies
      pip:
        requirements: "{{ install_dir }}/requirements.txt"
        virtualenv: "{{ install_dir }}/bt_venv"
      environment:
        PATH: "/root/.cargo/bin:{{ ansible_env.PATH }}"

    - name: Create PM2 config
      template:
        src: miner.config.js.j2
        dest: "{{ install_dir }}/miner.config.js"
        mode: "0644"

    - name: Print next steps
      debug:
        msg:
          - "Miner setup complete!"
          - ""
          - "Next steps:"
          - "  1. SSH into the VM"
          - "  2. Create wallet:"
          - "     cd {{ install_dir }} && source bt_venv/bin/activate"
          - "     btcli wallet create --wallet.name {{ wallet_name }} --wallet.hotkey {{ wallet_hotkey }}"
          - "  3. Fund wallet with >= 0.25 TAO"
          - "  4. Register on subnet:"
          - "     btcli subnet register --wallet.name {{ wallet_name }} --wallet.hotkey {{ wallet_hotkey }} --netuid {{ netuid }} --network {{ network }}"
          - "  5. Start miner:"
          - "     cd {{ install_dir }} && pm2 start miner.config.js"
